# general settings
name: test_EQMambaIR_lightSR_x2
model_type: MambaIRModel      # EQMambaIR also use MambaIRModel
scale: 2
num_gpu: 1
manual_seed: 10

datasets:
  test_1:  # the 1st test dataset
    name: Set5
    type: PairedImageDataset
    dataroot_gt: /data0/zzc/datasets/04SuperResolution/Set5/HR
    dataroot_lq: /data0/zzc/datasets/04SuperResolution/Set5/LR_bicubic/X2
    filename_tmpl: '{}x2'
    io_backend:
      type: disk

  test_2:  # the 2nd test dataset
    name: Set14
    type: PairedImageDataset
    dataroot_gt: /data0/zzc/datasets/04SuperResolution/Set14/HR
    dataroot_lq: /data0/zzc/datasets/04SuperResolution/Set14/LR_bicubic/X2
    filename_tmpl: '{}x2'
    io_backend:
      type: disk
#
  test_3:  # the 3rd test dataset
    name: B100
    type: PairedImageDataset
    dataroot_gt: /data0/zzc/datasets/04SuperResolution/B100/HR
    dataroot_lq: /data0/zzc/datasets/04SuperResolution/B100/LR_bicubic/X2
    filename_tmpl: '{}x2'
    io_backend:
      type: disk

  test_4:  # the 4th test dataset
    name: Urban100
    type: PairedImageDataset
    dataroot_gt: /data0/zzc/datasets/04SuperResolution/Urban100/HR
    dataroot_lq: /data0/zzc/datasets/04SuperResolution/Urban100/LR_bicubic/X2
    filename_tmpl: '{}x2'
    io_backend:
      type: disk

  test_5:  # the 5th test dataset
    name: Manga109
    type: PairedImageDataset
    dataroot_gt: /data0/zzc/datasets/04SuperResolution/Manga109/HR
    dataroot_lq: /data0/zzc/datasets/04SuperResolution/Manga109/LR_bicubic/X2
    filename_tmpl: '{}x2'
    io_backend:
      type: disk



# network structures
network_g:
  type: EQMambaIR
  upscale: 2
  in_chans: 3
  img_size: 64
  img_range: 1.
  d_state: 10
  depths: [6, 6, 6, 6]
  embed_dim: 60
  mlp_ratio: 1.2
  upsampler: 'pixelshuffledirect'
  resi_connection: '1conv'

# path
path:
  pretrain_network_g: /data0/zzc/projects/MambaIR/experiments/EQMambaIR_lightSR_x2/models/net_g_500000.pth
#  strict_load_g: true
  strict_load_g: False        # 20251108, debug for Fconv

# validation settings
val:
  save_img: true
  suffix: ~  # add suffix to saved images, if None, use exp name

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 2
      test_y_channel: true
    ssim:
      type: calculate_ssim
      crop_border: 2
      test_y_channel: true
